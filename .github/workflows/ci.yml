name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node:
          - "20"
          - "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup pnpm for workspace smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm install --global pnpm@9

      - name: Test
        run: npm test

      - name: UI smoke
        run: npm run ui:smoke

      - name: Diff check
        run: git diff --check

      - name: Production dependency audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm audit --omit=dev --audit-level=high

      - name: Package content audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run package:audit

      - name: Package install smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run package:smoke

      - name: Install modes smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run install:smoke

      - name: Package golden path
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run package:golden

      - name: Beta readiness
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run beta:readiness
